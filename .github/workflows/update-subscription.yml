name: Update VPN Subscription

on:
  schedule:
    - cron: '*/5 * * * *'  # Каждые 5 минут
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download fresh configs
        run: |
          echo "Downloading configs from source..."
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/subscription.txt" -o subscription.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/subscription_base64.txt" -o subscription_base64.txt
          echo "Download complete"

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add subscription.txt subscription_base64.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update: $(date -u +'%Y-%m-%d %H:%M') UTC" && git push)
