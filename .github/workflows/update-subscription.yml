name: Update VPN Subscription

on:
  schedule:
    # Запускаем каждую минуту (максимальная частота)
    - cron: '* * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [update-vpn]
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and filter VPN configs
        run: |
          echo "Fetching VPN configurations..."
          mkdir -p temp

          # ВСЕ КОНФИГИ ИЗ vpn-configs-for-russia
          echo "Downloading ALL configs from vpn-configs-for-russia..."
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_SS+All_RUS.txt" > temp/russia_1.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt" > temp/russia_2.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS_mobile.txt" > temp/russia_3.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt" > temp/russia_4.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" > temp/russia_5.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-all.txt" > temp/russia_6.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt" > temp/russia_7.txt
          curl -s "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-SNI-RU-all.txt" > temp/russia_8.txt

          # Объединяем ВСЕ конфиги БЕЗ ФИЛЬТРОВ
          echo "Merging ALL configs without filters..."
          cat temp/russia_*.txt | grep -v '^#' | grep -v '^$' | sort -u > temp/filtered.txt

          TOTAL=$(wc -l < temp/filtered.txt)
          echo "✅ Total configs: $TOTAL (ALL from vpn-configs-for-russia, no filters)"

          # Создаем финальные файлы
          cat > subscription.txt << 'EOFSUB'
          # profile-title: base64:4pyFc3Vic2NyaXB0aW9u4pyFIEBlbWJlZGl1bQ==
          # profile-update-interval: 1
          EOFSUB

          cat temp/filtered.txt >> subscription.txt

          # Base64 версия
          base64 -w 0 subscription.txt > subscription_base64.txt

          echo "✅ All configs merged from vpn-configs-for-russia"

          rm -rf temp

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add subscription.txt subscription_base64.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Update: $(date -u +"%Y-%m-%d %H:%M UTC")" && git push)
